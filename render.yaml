# Render.com — https://render.com/docs/deploy-fastapi
services:
  - type: web
    name: football-predictor-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: API_FOOTBALL_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false

  - type: web
    name: football-predictor-web
    runtime: static
    plan: free
    rootDir: mobile/build/web
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
