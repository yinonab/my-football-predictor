name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Render health endpoint
        run: |
          set -e
          URL="https://football-predictor-api-bq6h.onrender.com/api/health"
          echo "Pinging $URL"
          curl --fail --silent --show-error --max-time 30 "$URL"
          echo "Render service is awake"
