# Ping Render free tier every 14 min so the API does not sleep (15 min idle limit).
name: API keep-alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          curl -fsS --max-time 90 \
            "https://football-predictor-api-bq6h.onrender.com/api/health" \
            | head -c 500
