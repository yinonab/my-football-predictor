name: Refresh Sofascore Recent Form

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Refresh Sofascore fusion cache on Render
        env:
          RECENT_FORM_WARMUP_ADMIN_TOKEN: ${{ secrets.RECENT_FORM_WARMUP_ADMIN_TOKEN }}
        run: |
          set -e
          PROD_API_BASE="https://football-predictor-api-bq6h.onrender.com"
          URL="${PROD_API_BASE}/api/admin/refresh-sofascore-recent-form"

          if [ -z "${RECENT_FORM_WARMUP_ADMIN_TOKEN}" ]; then
            echo "::error::RECENT_FORM_WARMUP_ADMIN_TOKEN secret is not configured"
            exit 1
          fi

          for attempt in 1 2 3; do
            echo "POST $URL - attempt $attempt/3"

            response="$(curl --fail --silent --show-error --max-time 900 \
              -X POST "$URL" \
              -H "Authorization: Bearer ${RECENT_FORM_WARMUP_ADMIN_TOKEN}" \
              -H "Accept: application/json" \
              -w '\n%{http_code}' || true)"

            http_code="$(echo "$response" | tail -n1)"
            body="$(echo "$response" | sed '$d')"

            if [ "$http_code" -ge 200 ] 2>/dev/null && [ "$http_code" -lt 300 ] 2>/dev/null; then
              echo "Refresh succeeded (HTTP $http_code)"
              echo "$body" | python3 -m json.tool 2>/dev/null || echo "$body"
              exit 0
            fi

            echo "Refresh attempt $attempt failed (HTTP ${http_code:-unknown})"
            if [ -n "$body" ]; then
              echo "$body"
            fi

            if [ "$attempt" != "3" ]; then
              echo "Waiting 60 seconds before retry..."
              sleep 60
            fi
          done

          echo "::error::Sofascore refresh endpoint did not return 2xx after 3 attempts"
          exit 1
